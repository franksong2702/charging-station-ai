{
  "service": {
    "name": "charging-station-customer-service",
    "description": "充电桩智能客服（企业微信版）"
  },
  "provider": {
    "name": "tencent",
    "runtime": "Python3.9",
    "region": "ap-guangzhou",
    "memorySize": 256,
    "timeout": 30,
    "environment": {
      "variables": {
        "AI_WORKFLOW_API_URL": "http://YOUR_SERVER_IP:5000/run",
        "WECHAT_CORP_ID": "",
        "WECHAT_AGENT_ID": "",
        "WECHAT_SECRET": "",
        "WECHAT_TOKEN": "",
        "WECHAT_ENCODING_AES_KEY": ""
      }
    }
  },
  "functions": {
    "main": {
      "handler": "cloud_function.main_handler",
      "description": "处理企业微信消息并调用AI工作流",
      "events": [
        {
          "apigw": {
            "name": "charging-station-customer-service-api",
            "parameters": {
              "protocols": ["http", "https"],
              "description": "企业微信回调API",
              "environment": "release",
              "endpoints": [
                {
                  "path": "/wechat",
                  "method": "POST",
                  "description": "企业微信消息回调"
                },
                {
                  "path": "/wechat",
                  "method": "GET",
                  "description": "企业微信验证"
                },
                {
                  "path": "/test",
                  "method": "POST",
                  "description": "测试接口"
                }
              ]
            }
          }
        }
      ]
    }
  },
  "package": {
    "include": ["cloud_function.py"],
    "exclude": ["*.pyc", "__pycache__/*", "test_*", "*.md"]
  }
}
